<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Between the Lines — A John Stones Archive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Crimson+Pro:wght@300;400&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --crimson:     #8B1A1A;
      --crimson-dark:#5C0E0E;
      --crimson-deep:#3D0A0A;
      --gold:        #C9A84C;
      --gold-pale:   #E8D5A3;
      --cream:       #FAF6EF;
      --parchment:   #F2EBD9;
      --ink:         #1A1008;
      --ink-light:   #3D2B1F;
      --muted:       #7A6A5A;
      --border:      #D4C4A0;
      --header-h:    72px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'EB Garamond', Georgia, serif;
      background: var(--cream);
      color: var(--ink);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      background: linear-gradient(135deg, var(--crimson-deep) 0%, var(--crimson) 60%, var(--crimson-dark) 100%);
      height: var(--header-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2.5rem;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 20px rgba(0,0,0,0.4);
      border-bottom: 2px solid var(--gold);
    }

    .site-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      color: var(--gold-pale);
      letter-spacing: 0.04em;
      text-decoration: none;
      cursor: pointer;
    }
    .site-title span {
      font-style: italic;
      color: var(--gold);
    }

    .header-sub {
      font-family: 'Crimson Pro', serif;
      font-size: 0.85rem;
      color: rgba(232,213,163,0.65);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    nav a {
      color: var(--gold-pale);
      text-decoration: none;
      font-family: 'Crimson Pro', serif;
      font-size: 0.9rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-left: 1.8rem;
      opacity: 0.85;
      transition: opacity 0.2s, color 0.2s;
    }
    nav a:hover { opacity: 1; color: var(--gold); }

    /* ── HERO BANNER ── */
    .hero {
      background: linear-gradient(180deg, var(--crimson-dark) 0%, var(--crimson-deep) 100%);
      padding: 3.5rem 2.5rem 3rem;
      text-align: center;
      border-bottom: 1px solid var(--gold);
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 120%, rgba(201,168,76,0.12) 0%, transparent 65%);
    }
    .hero h2 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.1rem, 3vw, 1.4rem);
      color: var(--gold-pale);
      font-weight: 400;
      font-style: italic;
      letter-spacing: 0.03em;
      position: relative;
    }
    .hero-divider {
      width: 60px;
      height: 1px;
      background: var(--gold);
      margin: 1rem auto;
      opacity: 0.6;
    }
    .hero-stats {
      font-family: 'Crimson Pro', serif;
      font-size: 0.8rem;
      color: rgba(232,213,163,0.5);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      position: relative;
    }

    /* ── LAYOUT ── */
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
    }

    /* ── FILTERS ── */
    .filters {
      background: var(--parchment);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1rem 1.5rem;
      margin-bottom: 2rem;
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      align-items: center;
    }
    .filters label {
      font-family: 'Crimson Pro', serif;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
    }
    .filters select, .filters input {
      font-family: 'EB Garamond', serif;
      font-size: 0.95rem;
      background: var(--cream);
      border: 1px solid var(--border);
      padding: 0.3rem 0.6rem;
      color: var(--ink);
      border-radius: 3px;
      cursor: pointer;
    }
    .filters select:focus, .filters input:focus {
      outline: 1px solid var(--crimson);
    }

    /* ── FIC COUNT ── */
    .results-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 1.2rem;
      padding-bottom: 0.6rem;
      border-bottom: 1px solid var(--border);
    }
    .results-count {
      font-family: 'Crimson Pro', serif;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
    }
    .sort-label {
      font-family: 'Crimson Pro', serif;
      font-size: 0.85rem;
      color: var(--muted);
    }

    /* ── FIC CARD ── */
    .fic-list { display: flex; flex-direction: column; gap: 0; }

    .fic-card {
      background: #fff;
      border: 1px solid var(--border);
      border-top: none;
      padding: 1.4rem 1.6rem;
      transition: background 0.15s;
      cursor: pointer;
      position: relative;
    }
    .fic-card:first-child { border-top: 1px solid var(--border); border-radius: 4px 4px 0 0; }
    .fic-card:last-child  { border-radius: 0 0 4px 4px; }
    .fic-card:only-child  { border-radius: 4px; border-top: 1px solid var(--border); }
    .fic-card:hover       { background: var(--parchment); }

    .fic-card-inner { display: flex; gap: 1.2rem; }

    .rating-badge {
      flex-shrink: 0;
      width: 2rem;
      height: 2rem;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Crimson Pro', serif;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      margin-top: 0.1rem;
    }
    .rating-G  { background: #4a9b4a; color: #fff; }
    .rating-T  { background: #e6a817; color: #fff; }
    .rating-M  { background: #d4541a; color: #fff; }
    .rating-E  { background: #8B1A1A; color: #fff; }
    .rating-NR { background: #888; color: #fff; }

    .fic-body { flex: 1; min-width: 0; }

    .fic-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem;
      color: var(--crimson);
      font-weight: 700;
      margin-bottom: 0.2rem;
      line-height: 1.3;
    }
    .fic-card:hover .fic-title { text-decoration: underline; }

    .fic-meta-line {
      font-family: 'Crimson Pro', serif;
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }
    .fic-meta-line strong { color: var(--ink-light); }

    .fic-summary {
      font-size: 0.97rem;
      line-height: 1.6;
      color: var(--ink-light);
      margin-bottom: 0.7rem;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .fic-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
    }
    .tag {
      font-family: 'Crimson Pro', serif;
      font-size: 0.78rem;
      padding: 0.15rem 0.5rem;
      border-radius: 2px;
      background: var(--parchment);
      border: 1px solid var(--border);
      color: var(--ink-light);
      white-space: nowrap;
    }

    .fic-footer {
      display: flex;
      gap: 1.2rem;
      margin-top: 0.6rem;
      padding-top: 0.5rem;
      border-top: 1px dashed var(--border);
      font-family: 'Crimson Pro', serif;
      font-size: 0.8rem;
      color: var(--muted);
    }
    .fic-footer span::before { margin-right: 0.3rem; }

    /* ── SERIES BADGE ── */
    .series-tag {
      display: inline-block;
      font-family: 'Crimson Pro', serif;
      font-size: 0.78rem;
      padding: 0.1rem 0.5rem;
      background: rgba(139,26,26,0.08);
      border: 1px solid rgba(139,26,26,0.25);
      color: var(--crimson-dark);
      border-radius: 2px;
      margin-bottom: 0.5rem;
    }

    /* ── EMPTY STATE ── */
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--muted);
      font-family: 'Playfair Display', serif;
      font-style: italic;
    }
    .empty-state p { font-size: 1.1rem; }

    /* ── FIC READER ── */
    #reader-view {
      display: none;
      max-width: 720px;
      margin: 0 auto;
      padding: 2rem 1.5rem 5rem;
    }

    .reader-back {
      font-family: 'Crimson Pro', serif;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--crimson);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      margin-bottom: 2rem;
      text-decoration: none;
      border: none;
      background: none;
      padding: 0;
    }
    .reader-back:hover { text-decoration: underline; }

    .reader-header {
      border-bottom: 2px solid var(--crimson);
      padding-bottom: 1.5rem;
      margin-bottom: 2rem;
    }

    .reader-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.5rem, 4vw, 2.2rem);
      color: var(--ink);
      line-height: 1.25;
      margin-bottom: 1rem;
    }

    .reader-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem 1.5rem;
      font-family: 'Crimson Pro', serif;
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 1rem;
    }
    .reader-meta strong { color: var(--ink-light); }

    .reader-summary {
      background: var(--parchment);
      border-left: 3px solid var(--crimson);
      padding: 0.8rem 1rem;
      font-style: italic;
      color: var(--ink-light);
      margin-bottom: 1rem;
      font-size: 1rem;
      line-height: 1.6;
    }

    .reader-body {
      font-size: 1.1rem;
      line-height: 1.85;
      color: var(--ink);
    }
    .reader-body p { margin-bottom: 1.2em; }
    .reader-body h2, .reader-body h3 {
      font-family: 'Playfair Display', serif;
      color: var(--crimson-dark);
      margin: 2em 0 0.8em;
    }
    .reader-body hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2em auto;
      width: 50%;
    }
    .reader-body em { font-style: italic; }
    .reader-body strong { font-weight: 600; }

    /* ── FOOTER ── */
    footer {
      background: var(--crimson-deep);
      border-top: 1px solid var(--gold);
      padding: 1.5rem 2.5rem;
      text-align: center;
      font-family: 'Crimson Pro', serif;
      font-size: 0.8rem;
      color: rgba(232,213,163,0.45);
      letter-spacing: 0.1em;
    }

    /* ── LOADING ── */
    .loading {
      text-align: center;
      padding: 3rem;
      font-family: 'Playfair Display', serif;
      font-style: italic;
      color: var(--muted);
    }

    @media (max-width: 600px) {
      header { padding: 0 1rem; }
      .header-sub { display: none; }
      .fic-card { padding: 1rem; }
      nav a { margin-left: 1rem; font-size: 0.8rem; }
    }
  </style>
</head>
<body>

<header>
  <div>
    <div class="site-title" onclick="showList()">Between <span>the Lines</span></div>
    <div class="header-sub">A John Stones Fanfiction Archive</div>
  </div>
  <nav>
    <a href="#" onclick="showList(); return false;">Works</a>
    <a href="#about">About</a>
  </nav>
</header>

<!-- LIST VIEW -->
<div id="list-view">
  <div class="hero">
    <h2>All the John Stones fics you never knew you needed.</h2>
    <div class="hero-divider"></div>
    <div class="hero-stats" id="hero-stats">Loading works…</div>
  </div>

  <div class="container">
    <div class="filters">
      <label>Rating</label>
      <select id="filter-rating" onchange="applyFilters()">
        <option value="">All ratings</option>
        <option value="G">G</option>
        <option value="T">T</option>
        <option value="M">M</option>
        <option value="E">E</option>
      </select>
      <label>Pairing</label>
      <select id="filter-pairing" onchange="applyFilters()">
        <option value="">All pairings</option>
      </select>
      <label>Search</label>
      <input type="text" id="filter-search" placeholder="title, tags…" oninput="applyFilters()" />
    </div>

    <div class="results-header">
      <span class="results-count" id="results-count">— works</span>
      <span class="sort-label">sorted by date posted</span>
    </div>

    <div class="fic-list" id="fic-list">
      <div class="loading">Loading works…</div>
    </div>
  </div>
</div>

<!-- READER VIEW -->
<div id="reader-view">
  <button class="reader-back" onclick="showList()">← Back to works</button>
  <div class="reader-header">
    <h1 class="reader-title" id="reader-title"></h1>
    <div class="reader-meta" id="reader-meta"></div>
    <div class="reader-summary" id="reader-summary"></div>
    <div class="fic-tags" id="reader-tags"></div>
  </div>
  <div class="reader-body" id="reader-body"></div>
</div>

<footer>
  Between the Lines &nbsp;·&nbsp; A personal John Stones archive &nbsp;·&nbsp; Not for profit
</footer>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────────
// Fics are loaded from /fics/index.json which is auto-generated by Netlify CMS
let ALL_FICS = [];
let FILTERED  = [];

async function loadFics() {
  try {
    const res = await fetch('/fics/index.json');
    if (!res.ok) throw new Error('No fics file yet');
    ALL_FICS = await res.json();
  } catch {
    ALL_FICS = SAMPLE_FICS; // fallback to samples while setting up
  }
  // sort newest first
  ALL_FICS.sort((a,b) => new Date(b.date||0) - new Date(a.date||0));
  populatePairingFilter();
  applyFilters();
  updateHeroStats();
}

// ── SAMPLE DATA (shown until real fics are added) ─────────────────────────────
const SAMPLE_FICS = [
  {
    id: "sample-1",
    title: "Steadfast",
    pairing: "John Stones/Rúben Dias",
    rating: "T",
    tags: ["hurt/comfort", "post-match", "shoulder to lean on"],
    summary: "After a bruising defeat at Old Trafford, John doesn't want to talk. Rúben doesn't make him.",
    wordcount: 4820,
    chapters: 1,
    series: "",
    date: "2024-11-10",
    body: "This is a sample fic. Add your real fics through the admin panel at **/admin**.\n\nOnce you've published your first work, this sample will disappear."
  },
  {
    id: "sample-2",
    title: "The Weight of Ordinary Things",
    pairing: "John Stones/Rúben Dias",
    rating: "M",
    tags: ["domestic", "established relationship", "slow mornings", "fluff"],
    summary: "Sunday. No training. Just the flat, the light coming through the wrong windows, and the particular silence of a man who has finally stopped bracing for impact.",
    wordcount: 6200,
    chapters: 1,
    series: "Ordinary Things",
    date: "2024-10-28",
    body: "This is a sample fic. Add your real fics through the **admin panel**."
  },
  {
    id: "sample-3",
    title: "Fracture Line",
    pairing: "John Stones & England Squad",
    rating: "G",
    tags: ["gen", "injury", "friendship", "England NT"],
    summary: "A stress fracture. A hotel room. Four teammates who don't know how to say *stay*.",
    wordcount: 3100,
    chapters: 1,
    series: "",
    date: "2024-09-15",
    body: "This is a sample fic. Add your real fics through the **admin panel**."
  }
];

// ── FILTERS ───────────────────────────────────────────────────────────────────
function populatePairingFilter() {
  const sel = document.getElementById('filter-pairing');
  const pairings = [...new Set(ALL_FICS.map(f => f.pairing).filter(Boolean))].sort();
  pairings.forEach(p => {
    const o = document.createElement('option');
    o.value = p; o.textContent = p;
    sel.appendChild(o);
  });
}

function applyFilters() {
  const rating  = document.getElementById('filter-rating').value;
  const pairing = document.getElementById('filter-pairing').value;
  const search  = document.getElementById('filter-search').value.toLowerCase();

  FILTERED = ALL_FICS.filter(f => {
    if (rating  && f.rating  !== rating)  return false;
    if (pairing && f.pairing !== pairing) return false;
    if (search) {
      const haystack = [f.title, ...(f.tags||[])].join(' ').toLowerCase();
      if (!haystack.includes(search)) return false;
    }
    return true;
  });

  renderList();
}

function updateHeroStats() {
  const total = ALL_FICS.length;
  const words = ALL_FICS.reduce((s,f) => s + (f.wordcount||0), 0);
  document.getElementById('hero-stats').textContent =
    `${total} work${total!==1?'s':''} · ${words.toLocaleString()} words total`;
}

// ── RENDER LIST ───────────────────────────────────────────────────────────────
function renderList() {
  const el = document.getElementById('fic-list');
  document.getElementById('results-count').textContent =
    `${FILTERED.length} work${FILTERED.length!==1?'s':''}`;

  if (!FILTERED.length) {
    el.innerHTML = `<div class="empty-state"><p>No works match your filters.</p></div>`;
    return;
  }

  el.innerHTML = FILTERED.map(f => `
    <div class="fic-card" onclick="openFic('${f.id}')">
      <div class="fic-card-inner">
        <div class="rating-badge rating-${f.rating||'NR'}">${f.rating||'—'}</div>
        <div class="fic-body">
          ${f.series ? `<div class="series-tag">Part of: ${f.series}</div>` : ''}
          <div class="fic-title">${f.title}</div>
          <div class="fic-meta-line">
            <strong>${f.pairing||'Gen'}</strong>
            ${f.date ? ' · ' + formatDate(f.date) : ''}
          </div>
          <div class="fic-summary">${f.summary||''}</div>
          ${f.tags?.length ? `<div class="fic-tags">${f.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>` : ''}
          <div class="fic-footer">
            <span>📄 ${(f.wordcount||0).toLocaleString()} words</span>
            <span>📚 ${f.chapters||1} chapter${(f.chapters||1)!==1?'s':''}</span>
          </div>
        </div>
      </div>
    </div>
  `).join('');
}

// ── READER ────────────────────────────────────────────────────────────────────
function openFic(id) {
  const f = ALL_FICS.find(x => x.id === id);
  if (!f) return;

  document.getElementById('reader-title').textContent = f.title;

  document.getElementById('reader-meta').innerHTML = `
    <span><strong>Pairing:</strong> ${f.pairing||'Gen'}</span>
    <span><strong>Rating:</strong> ${f.rating||'—'}</span>
    <span><strong>Words:</strong> ${(f.wordcount||0).toLocaleString()}</span>
    <span><strong>Chapters:</strong> ${f.chapters||1}</span>
    ${f.series ? `<span><strong>Series:</strong> ${f.series}</span>` : ''}
    ${f.date ? `<span><strong>Posted:</strong> ${formatDate(f.date)}</span>` : ''}
  `;

  document.getElementById('reader-summary').textContent = f.summary||'';

  document.getElementById('reader-tags').innerHTML =
    (f.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('');

  document.getElementById('reader-body').innerHTML =
    typeof marked !== 'undefined' ? marked.parse(f.body||'') : (f.body||'').replace(/\n/g,'<br>');

  document.getElementById('list-view').style.display   = 'none';
  document.getElementById('reader-view').style.display = 'block';
  window.scrollTo(0, 0);
}

function showList() {
  document.getElementById('list-view').style.display   = 'block';
  document.getElementById('reader-view').style.display = 'none';
  window.scrollTo(0, 0);
}

// ── UTILS ─────────────────────────────────────────────────────────────────────
function formatDate(d) {
  try {
    return new Date(d).toLocaleDateString('en-GB', {day:'numeric',month:'short',year:'numeric'});
  } catch { return d; }
}

// ── INIT ──────────────────────────────────────────────────────────────────────
loadFics();
</script>
</body>
</html>
